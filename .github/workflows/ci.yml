name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test & typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check (core)
        run: npm run typecheck

      - name: Type check (editor)
        run: npm run editor:typecheck

      - name: Run tests
        run: npm test

      - name: Coverage report
        run: npm run test:coverage
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build core library
        run: npm run build

      - name: Build editor
        run: npm run editor:build

      - name: Bundle privacy audit
        run: npm run audit:bundle

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run e2e
