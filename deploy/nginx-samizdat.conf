# SAMIZDAT nginx configuration
# Copy to /etc/nginx/sites-available/samizdat and symlink to sites-enabled/.
# Replace EDITOR_ONION, RENDERER_ONION, INDEXER_ONION with your .onion addresses.
# Replace /opt/samizdat with your actual install path.

# ── Editor (static files) ────────────────────────────────────────────────────

server {
    listen 127.0.0.1:4000;
    server_name EDITOR_ONION.onion;

    root /opt/samizdat/editor/dist;
    index index.html;

    # No logs — do not record which pages visitors load
    access_log off;
    error_log /var/log/nginx/samizdat-editor-error.log warn;

    # All assets are cache-busted by Vite; cache aggressively
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }
}

# ── Renderer (Node.js proxy) ─────────────────────────────────────────────────

server {
    listen 127.0.0.1:4001;
    server_name RENDERER_ONION.onion;

    access_log off;
    error_log /var/log/nginx/samizdat-renderer-error.log warn;

    # Do not log the txid — it would correlate readers with content
    log_not_found off;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Proto "";

        # Rate limiting — define zone in nginx.conf: limit_req_zone $binary_remote_addr zone=samizdat_renderer:10m rate=10r/s;
        # limit_req zone=samizdat_renderer burst=20 nodelay;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }
}

# ── Indexer (Node.js proxy) ──────────────────────────────────────────────────

server {
    listen 127.0.0.1:4002;
    server_name INDEXER_ONION.onion;

    access_log off;
    error_log /var/log/nginx/samizdat-indexer-error.log warn;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-For "";

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cache-Control "no-store" always;
    }
}
